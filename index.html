<link rel="stylesheet" href="style.css">
<div class="selection-card">
    <div class="card-header">
        <h2>Select your option</h2>
    </div>
    <div class="card-body">
        <label class="option-item">
            <input type="radio" name="user-type" value="gamer">
            <span class="custom-radio"></span>
            <span class="label-text">Gamer</span>
        </label>

        <label class="option-item">
            <input type="radio" name="user-type" value="youtuber">
            <span class="custom-radio"></span>
            <span class="label-text">YouTuber</span>
        </label>

        <label class="option-item">
            <input type="radio" name="user-type" value="student" checked>
            <span class="custom-radio"></span>
            <span class="label-text">Student</span>
        </label>

        <label class="option-item">
            <input type="radio" name="user-type" value="developer">
            <span class="custom-radio"></span>
            <span class="label-text">Developer</span>
        </label>
    </div>
</div>
<script src="script.js"></script>
